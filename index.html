<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Online iOS Pro</title>

<style>
body {
    margin: 0;
    font-family: -apple-system;
    background: #f2f2f7;
}

/* SPLASH SCREEN */
.splash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #007aff, #5ac8fa);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    z-index: 9999;
    animation: fadeOut 1s ease 2s forwards;
}

.splash h1 {
    font-size: 32px;
    margin: 0;
}

.splash p {
    margin-top: 10px;
    font-size: 16px;
    opacity: 0.9;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

.header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);} 
    to { opacity: 1; transform: translateY(0);} 
}

.card {
    margin: 15px;
    padding: 20px;
    border-radius: 20px;
    background: white;
    animation: cardPop 0.5s ease;
}

@keyframes cardPop {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
}

button {
    background: #007aff;
    color: white;
}

.item {
    padding: 12px;
    border-bottom: 1px solid #eee;
    animation: fadeIn 0.4s ease;
}

.note {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
}

.actions button {
    width: auto;
    margin-right: 5px;
    background: #e5e5ea;
    color: black;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div class="splash">
    <h1>💰 Loan App</h1>
    <p>เว็บนี้สนับสนุนโดยคุณ ปอนด์</p>
</div>

<div class="header">💰 Loan Pro</div>

<div class="card">
    <div>ยอดคงเหลือ</div>
    <h2 id="balance">0 บาท</h2>

    <input id="amount" type="number" placeholder="จำนวนเงิน">
    <input id="date" type="date">
    <input id="note" placeholder="บันทึกช่วยจำ">

    <button onclick="addData()">บันทึก</button>
</div>

<div class="card">
    <div>รายการ</div>
    <div id="list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCYH3hqw8Xm-2-JBMwCk8wzTmhvM4leFyk",
  authDomain: "loan-100000bypond.firebaseapp.com",
  projectId: "loan-100000bypond",
  storageBucket: "loan-100000bypond.firebasestorage.app",
  messagingSenderId: "790911699649",
  appId: "1:790911699649:web:58e55bf9cd2fffbb8ea240"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const PASSWORD = "006200";

function checkPassword() {
    const input = prompt("ใส่รหัส:");
    if (input === PASSWORD) return true;
    alert("รหัสผิด");
    return false;
}

function addData() {
    const amount = parseFloat(document.getElementById('amount').value);
    const date = document.getElementById('date').value;
    const note = document.getElementById('note').value;

    if (!amount || !date) return alert("กรอกให้ครบ");

    db.collection("loan").add({ amount, date, note });

    document.getElementById('amount').value = '';
    document.getElementById('note').value = '';
}

function deleteItem(id) {
    if (!checkPassword()) return;
    db.collection("loan").doc(id).delete();
}

/* REALTIME */
db.collection("loan").orderBy("date", "desc")
.onSnapshot(snapshot => {

    let total = 0;
    const list = document.getElementById('list');
    list.innerHTML = '';

    snapshot.forEach(doc => {
        const data = doc.data();
        total += data.amount;

        const div = document.createElement('div');
        div.className = 'item';

        div.innerHTML = `
        📅 ${data.date}<br>
        💸 ${data.amount.toLocaleString()} บาท
        ${data.note ? `<div class="note">📝 ${data.note}</div>` : ''}
        <div class="actions">
            <button onclick="deleteItem('${doc.id}')">ลบ</button>
        </div>`;

        list.appendChild(div);
    });

    document.getElementById('balance').innerText =
        (100000 - total).toLocaleString() + " บาท";
});
</script>

</body>
</html>
