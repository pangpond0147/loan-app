<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Online iOS</title>

<style>
body {
    margin: 0;
    font-family: -apple-system;
    background: #f2f2f7;
}
.header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}
.card {
    margin: 15px;
    padding: 20px;
    border-radius: 20px;
    background: white;
}
input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
}
button {
    background: #007aff;
    color: white;
}
.item {
    padding: 10px;
    border-bottom: 1px solid #eee;
}
.actions button {
    width: auto;
    margin-right: 5px;
    background: #e5e5ea;
    color: black;
}
</style>
</head>

<body>

<div class="header">💰 Loan Online</div>

<div class="card">
    <div>ยอดคงเหลือ</div>
    <h2 id="balance">0 บาท</h2>

    <input id="amount" type="number" placeholder="จำนวนเงิน">
    <input id="date" type="date">

    <button onclick="addData()">บันทึก</button>
</div>

<div class="card">
    <div>รายการ</div>
    <div id="list"></div>
</div>

<!-- Firebase (เวอร์ชันใช้ตรงได้) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCYH3hqw8Xm-2-JBMwCk8wzTmhvM4leFyk",
  authDomain: "loan-100000bypond.firebaseapp.com",
  projectId: "loan-100000bypond",
  storageBucket: "loan-100000bypond.firebasestorage.app",
  messagingSenderId: "790911699649",
  appId: "1:790911699649:web:58e55bf9cd2fffbb8ea240"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const PASSWORD = "006200";

/* ADD */
function addData() {
    const amount = parseFloat(document.getElementById('amount').value);
    const date = document.getElementById('date').value;

    if (!amount || !date) return alert("กรอกให้ครบ");

    db.collection("loan").add({ amount, date });

    document.getElementById('amount').value = '';
}

/* PASSWORD */
function checkPassword() {
    const input = prompt("ใส่รหัส:");
    if (input === PASSWORD) return true;
    alert("รหัสผิด");
    return false;
}

/* DELETE */
function deleteItem(id) {
    if (!checkPassword()) return;
    db.collection("loan").doc(id).delete();
}

/* RENDER REALTIME */
db.collection("loan").orderBy("date", "desc")
.onSnapshot(snapshot => {

    let total = 0;
    const list = document.getElementById('list');
    list.innerHTML = '';

    snapshot.forEach(doc => {
        const data = doc.data();
        total += data.amount;

        const div = document.createElement('div');
        div.className = 'item';

        div.innerHTML = `
        📅 ${data.date}<br>
        💸 ${data.amount.toLocaleString()} บาท
        <div class="actions">
            <button onclick="deleteItem('${doc.id}')">ลบ</button>
        </div>`;

        list.appendChild(div);
    });

    document.getElementById('balance').innerText =
        (100000 - total).toLocaleString() + " บาท";
});
</script>

</body>
</html>
