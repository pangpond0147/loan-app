<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan iOS Style</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: linear-gradient(180deg, #f2f2f7, #e5e5ea);
}

/* HEADER */
.header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* CARD */
.card {
    margin: 15px;
    padding: 20px;
    border-radius: 25px;
    backdrop-filter: blur(30px);
    background: rgba(255,255,255,0.7);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* BALANCE */
.balance {
    font-size: 32px;
    font-weight: bold;
    margin-top: 10px;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 15px;
    border: none;
    background: #f2f2f7;
    font-size: 16px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 15px;
    border: none;
    background: #007aff;
    color: white;
    font-size: 16px;
    font-weight: bold;
}

/* LIST */
.item {
    background: rgba(255,255,255,0.9);
    padding: 15px;
    border-radius: 20px;
    margin-top: 10px;
}

/* ACTION */
.actions {
    margin-top: 8px;
}
.actions button {
    width: auto;
    padding: 6px 10px;
    font-size: 13px;
    margin-right: 5px;
    background: #e5e5ea;
    color: black;
}
</style>
</head>

<body>

<div class="header">💰 Loan</div>

<div class="card">
    <div>ยอดคงเหลือ</div>
    <div class="balance" id="balance">0 บาท</div>

    <input type="number" id="amount" placeholder="จำนวนเงิน">
    <input type="date" id="date">

    <button onclick="addOrUpdate()">บันทึก</button>
</div>

<div class="card">
    <div>รายการชำระ</div>
    <div id="log"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('loanData')) || [];
let editIndex = null;
const initialLoan = 100000;
const PASSWORD = "006200";

/* PASSWORD */
function checkPassword() {
    const input = prompt("กรอกรหัส:");
    if (input === PASSWORD) return true;
    alert("รหัสผิด");
    return false;
}

/* CALC */
function calculateBalance() {
    let total = data.reduce((sum, item) => sum + item.amount, 0);
    return initialLoan - total;
}

/* RENDER */
function render() {
    const log = document.getElementById('log');
    log.innerHTML = '';

    data.slice().reverse().forEach((item, i) => {
        const index = data.length - 1 - i;

        const div = document.createElement('div');
        div.className = 'item';

        div.innerHTML = `
        📅 ${item.date}<br>
        💸 ${item.amount.toLocaleString()} บาท
        <div class="actions">
            <button onclick="editItem(${index})">แก้ไข</button>
            <button onclick="deleteItem(${index})">ลบ</button>
        </div>`;

        log.appendChild(div);
    });

    document.getElementById('balance').innerText =
        calculateBalance().toLocaleString() + " บาท";

    localStorage.setItem('loanData', JSON.stringify(data));
}

/* ADD / UPDATE */
function addOrUpdate() {
    const amount = parseFloat(document.getElementById('amount').value);
    const date = document.getElementById('date').value;

    if (!amount || !date) {
        alert("กรอกข้อมูลให้ครบ");
        return;
    }

    if (editIndex !== null) {
        data[editIndex] = { amount, date };
        editIndex = null;
    } else {
        data.push({ amount, date });
    }

    document.getElementById('amount').value = '';
    document.getElementById('date').value = '';

    render();
}

/* EDIT */
function editItem(index) {
    if (!checkPassword()) return;

    const item = data[index];
    document.getElementById('amount').value = item.amount;
    document.getElementById('date').value = item.date;
    editIndex = index;
}

/* DELETE */
function deleteItem(index) {
    if (!checkPassword()) return;

    if (confirm("ลบรายการนี้?")) {
        data.splice(index, 1);
        render();
    }
}

render();
</script>

</body>
</html>
